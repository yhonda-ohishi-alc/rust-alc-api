name: Coverage Check

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Output mode'
        required: true
        type: choice
        options:
          - summary
          - not-100
          - file
        default: not-100
      file_pattern:
        description: 'File pattern (mode=file only, e.g. "devices" or "tenko_sessions")'
        required: false
        type: string
        default: ''

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Coverage (${{ inputs.mode }})
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://postgres:test@localhost:5432/postgres?options=-c search_path=alc_api
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: llvm-tools-preview

      - uses: swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.4

      - name: Initialize test database
        run: psql -f scripts/init_local_db.sql
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: test

      - name: Run cargo llvm-cov
        run: |
          cargo llvm-cov --text > /tmp/llvm-cov-output.txt 2>/tmp/llvm-cov-stderr.txt || {
            echo "cargo llvm-cov failed:"
            tail -30 /tmp/llvm-cov-stderr.txt
            exit 1
          }
          echo "=== Test results ==="
          grep "test result:" /tmp/llvm-cov-stderr.txt || true

      - name: Parse coverage → Job Summary
        run: bash scripts/parse_coverage.sh "${{ inputs.mode }}" "${{ inputs.file_pattern }}" /tmp/llvm-cov-output.txt

      - name: Coverage 100% regression check
        run: bash scripts/check_coverage_100.sh --use-cache /tmp/llvm-cov-output.txt

      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llvm-cov-text
          path: /tmp/llvm-cov-output.txt
          retention-days: 30
