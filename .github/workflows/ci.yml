name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  pr-limit:
    name: PR Limit Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check open PRs by same author
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          THIS_PR="${{ github.event.pull_request.number }}"
          COUNT=$(gh pr list --repo "${{ github.repository }}" --state open --author "$AUTHOR" --json number -q "[ .[] | select(.number != $THIS_PR) ] | length")
          if [ "$COUNT" -gt 0 ]; then
            echo "::error::$AUTHOR has $COUNT other open PR(s). Close or merge them before creating a new one."
            gh pr list --repo "${{ github.repository }}" --state open --author "$AUTHOR" --json number,title -q ".[] | select(.number != $THIS_PR) | \"  #\\(.number) \\(.title)\""
            exit 1
          fi

  cache-warm:
    name: Cache Warm (${{ matrix.target.name }})
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: "check", key: "check", cmd: "cargo clippy --workspace -- -D warnings && cargo test export_bindings --workspace" }
          - { name: "test", key: "test-lib", cmd: "cargo llvm-cov nextest --no-report --ignore-run-fail --lib --workspace" }
          - { name: "mock-tenko", key: "test-mock-tenko", cmd: "cargo llvm-cov nextest --no-report --ignore-run-fail --test mock_tenko" }
          - { name: "mock-dtako", key: "test-mock-dtako", cmd: "cargo llvm-cov nextest --no-report --ignore-run-fail --test mock_dtako" }
          - { name: "mock-devices", key: "test-mock-devices", cmd: "cargo llvm-cov nextest --no-report --ignore-run-fail --test mock_devices" }
          - { name: "mock-carins", key: "test-mock-carins", cmd: "cargo llvm-cov nextest --no-report --ignore-run-fail --test mock_carins" }
          - { name: "mock-misc", key: "test-mock-misc", cmd: "cargo llvm-cov nextest --no-report --ignore-run-fail --test mock_misc --test archive_repo_test" }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: llvm-tools-preview, clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target.key }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.4,cargo-nextest
      - name: Build (${{ matrix.target.name }})
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: ${{ matrix.target.cmd }}

  cache-warm-bazel:
    name: "Cache Warm (bazel-${{ matrix.name }})"
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: backend, targets: "//:rust-alc-api //:migrate //:archive" }
          - { name: gateway, targets: "//crates/gateway" }
          - { name: tenko, targets: "//crates/tenko-api" }
          - { name: carins, targets: "//crates/carins-api" }
          - { name: dtako, targets: "//crates/dtako-api" }
    steps:
      - uses: actions/checkout@v4
      - uses: ippoan/setup-bazel@main
        with:
          disk-cache: "bazel-${{ matrix.name }}"
          external-cache: true
          repository-cache: true
      - name: Build (Bazel)
        run: bazel build -c opt ${{ matrix.targets }}

  cache-cleanup:
    name: Cache Cleanup
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [cache-warm]
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete stale caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::group::Current cache usage"
          gh cache list -R ${{ github.repository }} --sort size_in_bytes --order desc --limit 20 \
            --json key,sizeInBytes --jq '.[] | "\(.sizeInBytes / 1048576 | floor)MB\t\(.key)"'
          echo "::endgroup::"

          echo "::group::Cleaning stale rust-cache entries"
          gh cache list -R ${{ github.repository }} --limit 200 \
            --json id,key,sizeInBytes,lastAccessedAt \
            --jq '.[] | select(.key | startswith("v0-rust-"))' | python3 -c "
          import json, sys
          entries = [json.loads(line) for line in sys.stdin]
          groups = {}
          for e in entries:
              base = '-'.join(e['key'].rsplit('-', 1)[:-1])
              groups.setdefault(base, []).append(e)
          to_delete = []
          for base, items in groups.items():
              items.sort(key=lambda x: x['lastAccessedAt'], reverse=True)
              to_delete.extend(items[1:])
          for d in to_delete:
              print(f\"Deleting {d['sizeInBytes']//1048576}MB {d['key']}\")
          with open('/tmp/cache-ids.txt', 'w') as f:
              for d in to_delete:
                  f.write(str(d['id']) + '\n')
          print(f'Total: {len(to_delete)} stale entries')
          "
          if [ -f /tmp/cache-ids.txt ]; then
            while read id; do
              gh cache delete "$id" -R ${{ github.repository }} 2>/dev/null || true
            done < /tmp/cache-ids.txt
          fi
          echo "::endgroup::"

  check:
    name: Format & Lint
    needs: [pr-limit]
    if: "always() && !(github.ref == 'refs/heads/main' && github.event_name == 'push') && (needs.pr-limit.result == 'success' || needs.pr-limit.result == 'skipped')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: rustfmt, clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: swatinem/rust-cache@v2
        with:
          shared-key: check
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo fmt --check --all
      - run: cargo clippy --workspace -- -D warnings
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
      - name: Generate TypeScript bindings
        run: cargo test export_bindings --workspace
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
      - uses: actions/upload-artifact@v4
        with:
          name: ts-bindings-${{ github.sha }}
          path: crates/*/bindings/*.ts
          retention-days: 90

  test-matrix:
    name: Tests (${{ matrix.group.name }})
    needs: [pr-limit]
    if: "always() && !(github.ref == 'refs/heads/main' && github.event_name == 'push') && (needs.pr-limit.result == 'success' || needs.pr-limit.result == 'skipped')"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group:
          - { name: "lib", cmd: "--lib --workspace" }
          - { name: "mock-tenko", cmd: "--test mock_tenko" }
          - { name: "mock-dtako", cmd: "--test mock_dtako" }
          - { name: "mock-devices", cmd: "--test mock_devices" }
          - { name: "mock-carins", cmd: "--test mock_carins" }
          - { name: "mock-misc", cmd: "--test mock_misc --test archive_repo_test" }
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      TEST_DATABASE_URL: "postgresql://postgres:test@localhost:5432/postgres?options=-c search_path=alc_api"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: llvm-tools-preview
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.group.name }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.4,cargo-nextest

      - name: Init DB
        run: psql "postgresql://postgres:test@localhost:5432/postgres" -f scripts/init_local_db.sql

      - name: Run tests with coverage
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: |
          cargo llvm-cov nextest --no-report ${{ matrix.group.cmd }}
          PKGS=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[].name' | sed 's/^/-p /' | tr '\n' ' ')
          cargo llvm-cov report $PKGS --text > /tmp/llvm-cov-output.txt
          echo "=== Coverage Summary ==="
          tail -5 /tmp/llvm-cov-output.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.group.name }}
          path: /tmp/llvm-cov-output.txt
          retention-days: 1

  coverage-check:
    name: Coverage Check
    needs: [test-matrix]
    if: "always() && needs.test-matrix.result == 'success'"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: /tmp/coverage-parts
      - name: Merge coverage and check
        run: |
          python3 scripts/merge_coverage.py /tmp/coverage-parts/*/llvm-cov-output.txt > /tmp/llvm-cov-output.txt
          echo "=== Merged Coverage Summary ==="
          # Count totals from merged output
          python3 -c "
          import re, sys
          total_lines = 0; total_miss = 0
          current = None
          with open('/tmp/llvm-cov-output.txt') as f:
              for line in f:
                  if re.match(r'^/.*\.rs:$', line.strip()):
                      current = True
                  elif current and re.match(r'^\s*\d+\|\s*0\|', line):
                      total_lines += 1; total_miss += 1
                  elif current and re.match(r'^\s*\d+\|\s*[1-9]', line):
                      total_lines += 1
          covered = total_lines - total_miss
          pct = covered / total_lines * 100 if total_lines else 0
          print(f'Lines: {total_lines}, Covered: {covered}, Missed: {total_miss}, Coverage: {pct:.1f}%')
          "
          bash scripts/check_coverage_100.sh --combined --use-cache /tmp/llvm-cov-output.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: llvm-cov-text
          path: /tmp/llvm-cov-output.txt
          retention-days: 30

  # Bazel build → artifact upload (shared by parallel docker jobs)
  build-image:
    name: "Build ${{ matrix.name }}"
    needs: [pr-limit]
    if: "always() && github.event_name == 'pull_request' && (needs.pr-limit.result == 'success' || needs.pr-limit.result == 'skipped')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: backend
            targets: "//:rust-alc-api //:migrate //:archive"
            binaries: "rust-alc-api migrate archive"
            bin-paths: "bazel-bin/rust-alc-api bazel-bin/migrate bazel-bin/archive"
            dockerfile: Dockerfile
            tag-suffix: ""
            extra-copy: "migrations"
          - name: gateway
            targets: "//crates/gateway"
            binaries: "gateway"
            bin-paths: "bazel-bin/crates/gateway/gateway"
            dockerfile: Dockerfile.gateway
            tag-suffix: "-gateway"
            extra-copy: ""
          - name: tenko
            targets: "//crates/tenko-api"
            binaries: "tenko-api"
            bin-paths: "bazel-bin/crates/tenko-api/tenko-api"
            dockerfile: Dockerfile.tenko
            tag-suffix: "-tenko"
            extra-copy: ""
          - name: carins
            targets: "//crates/carins-api"
            binaries: "carins-api"
            bin-paths: "bazel-bin/crates/carins-api/carins-api"
            dockerfile: Dockerfile.carins
            tag-suffix: "-carins"
            extra-copy: ""
          - name: dtako
            targets: "//crates/dtako-api"
            binaries: "dtako-api"
            bin-paths: "bazel-bin/crates/dtako-api/dtako-api"
            dockerfile: Dockerfile.dtako
            tag-suffix: "-dtako"
            extra-copy: ""
    steps:
      - uses: actions/checkout@v4

      - uses: ippoan/setup-bazel@main
        with:
          disk-cache: "bazel-${{ matrix.name }}"
          r2-endpoint: ${{ vars.BAZEL_R2_ENDPOINT }}
          r2-bucket: ${{ vars.BAZEL_R2_BUCKET }}
          r2-access-key-id: ${{ secrets.BAZEL_R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.BAZEL_R2_SECRET_ACCESS_KEY }}

      - name: Build (Bazel)
        run: bazel build -c opt ${{ matrix.targets }}

      - name: Prepare Docker context
        run: |
          mkdir -p ctx
          cp ${{ matrix.bin-paths }} ctx/
          chmod u+w ctx/*
          strip ctx/*
          cp ${{ matrix.dockerfile }} ctx/Dockerfile
          if [ -n "${{ matrix.extra-copy }}" ]; then
            cp -r ${{ matrix.extra-copy }} ctx/
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ctx
          push: true
          tags: "ghcr.io/${{ github.repository }}${{ matrix.tag-suffix }}:${{ github.sha }}"
          cache-from: "type=gha,scope=${{ matrix.name }}"
          cache-to: "type=gha,mode=max,scope=${{ matrix.name }}"

  docker-dev:
    name: Tag dev
    if: github.event_name == 'pull_request'
    needs: [build-image]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy sha tag to dev (all images)
        run: |
          REPO="ghcr.io/${{ github.repository }}"
          SHA="${{ github.sha }}"
          for suffix in "" "-gateway" "-tenko" "-carins" "-dtako"; do
            docker pull "${REPO}${suffix}:${SHA}"
            docker tag "${REPO}${suffix}:${SHA}" "${REPO}${suffix}:dev"
            docker push "${REPO}${suffix}:dev"
          done

  docker-latest:
    name: Tag latest
    if: "always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.check.result == 'success' && needs.coverage-check.result == 'success'"
    needs: [check, coverage-check]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag dev → sha + latest (all images)
        run: |
          REPO="ghcr.io/${{ github.repository }}"
          SHA="${{ github.sha }}"
          for suffix in "" "-gateway" "-tenko" "-carins" "-dtako"; do
            docker pull "${REPO}${suffix}:dev"
            docker tag "${REPO}${suffix}:dev" "${REPO}${suffix}:${SHA}"
            docker tag "${REPO}${suffix}:dev" "${REPO}${suffix}:latest"
            docker push "${REPO}${suffix}:${SHA}"
            docker push "${REPO}${suffix}:latest"
          done

  deploy-staging:
    name: Deploy Staging
    if: github.event_name == 'pull_request'
    needs: [build-image, coverage-check]
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      packages: write
    with:
      environment: staging
      image_sha: ${{ github.sha }}
    secrets:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

  deploy-production:
    name: Deploy Production
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      packages: write
    with:
      environment: production
      image_sha: ${{ github.sha }}
      ref_name: ${{ github.ref_name }}
    secrets:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

  auto-merge:
    name: Auto Merge
    needs: [check, coverage-check, build-image]
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      needs.check.result == 'success' &&
      needs.coverage-check.result == 'success' &&
      needs.build-image.result == 'success'
    uses: ippoan/ci-workflows/.github/workflows/auto-merge.yml@main
    permissions:
      contents: write
      pull-requests: write
    secrets:
      AUTO_MERGE_PAT: ${{ secrets.TAG_RELEASE_PAT }}
