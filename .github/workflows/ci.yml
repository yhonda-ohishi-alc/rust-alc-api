name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: rustfmt, clippy
      - uses: swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings

  unit-tests:
    name: Unit Tests + Coverage (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: llvm-tools-preview
      - uses: swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run unit tests
        run: cargo test --lib

      - name: Coverage regression check (unit files)
        run: bash scripts/check_coverage_100.sh --unit-only

  integration-tests:
    name: Integration Tests + Coverage (full)
    runs-on: ubuntu-latest
    needs: check
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://postgres:test@localhost:5432/postgres?options=-c search_path=alc_api
      RUST_TEST_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: llvm-tools-preview
      - uses: swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Initialize test database
        run: psql -f scripts/init_local_db.sql
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: test

      - name: Run integration tests + coverage
        run: |
          RUST_TEST_THREADS=1 cargo llvm-cov --text -- --test-threads=1 > /tmp/llvm-cov-output.txt 2>&1 || { echo "cargo llvm-cov failed:"; tail -50 /tmp/llvm-cov-output.txt; exit 1; }

      - name: Coverage regression check (all 100% files)
        run: bash scripts/check_coverage_100.sh --use-cache /tmp/llvm-cov-output.txt
