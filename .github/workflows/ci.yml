name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  pr-limit:
    name: PR Limit Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check open PRs by same author
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          THIS_PR="${{ github.event.pull_request.number }}"
          COUNT=$(gh pr list --repo "${{ github.repository }}" --state open --author "$AUTHOR" --json number -q "[ .[] | select(.number != $THIS_PR) ] | length")
          if [ "$COUNT" -gt 0 ]; then
            echo "::error::$AUTHOR has $COUNT other open PR(s). Close or merge them before creating a new one."
            gh pr list --repo "${{ github.repository }}" --state open --author "$AUTHOR" --json number,title -q ".[] | select(.number != $THIS_PR) | \"  #\\(.number) \\(.title)\""
            exit 1
          fi

  cache-warm:
    name: Cache Warm (${{ matrix.target.name }})
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: "check", key: "check", cmd: "cargo clippy --workspace -- -D warnings && cargo test export_bindings --workspace" }
          - { name: "test", key: "test-lib", cmd: "cargo llvm-cov nextest --no-report --ignore-run-fail --lib --workspace" }
          - { name: "mock-tenko", key: "test-mock-tenko", cmd: "cargo llvm-cov nextest --no-report --ignore-run-fail --test mock_tenko" }
          - { name: "mock-dtako", key: "test-mock-dtako", cmd: "cargo llvm-cov nextest --no-report --ignore-run-fail --test mock_dtako" }
          - { name: "mock-devices", key: "test-mock-devices", cmd: "cargo llvm-cov nextest --no-report --ignore-run-fail --test mock_devices" }
          - { name: "mock-carins", key: "test-mock-carins", cmd: "cargo llvm-cov nextest --no-report --ignore-run-fail --test mock_carins" }
          - { name: "mock-misc", key: "test-mock-misc", cmd: "cargo llvm-cov nextest --no-report --ignore-run-fail --test mock_misc --test archive_repo_test" }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: llvm-tools-preview, clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target.key }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.4,cargo-nextest
      - name: Build (${{ matrix.target.name }})
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: ${{ matrix.target.cmd }}

  cache-warm-bazel:
    name: Cache Warm (bazel)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ippoan/setup-bazel@main
        with:
          disk-cache: bazel
          external-cache: true
          repository-cache: true
      - name: Build release binaries (Bazel)
        run: bazel build -c opt //:rust-alc-api //:migrate //:archive //crates/gateway //crates/tenko-api //crates/carins-api //crates/dtako-api

  cache-cleanup:
    name: Cache Cleanup
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [cache-warm]
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete stale caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::group::Current cache usage"
          gh cache list -R ${{ github.repository }} --sort size_in_bytes --order desc --limit 20 \
            --json key,sizeInBytes --jq '.[] | "\(.sizeInBytes / 1048576 | floor)MB\t\(.key)"'
          echo "::endgroup::"

          echo "::group::Cleaning stale rust-cache entries"
          gh cache list -R ${{ github.repository }} --limit 200 \
            --json id,key,sizeInBytes,lastAccessedAt \
            --jq '.[] | select(.key | startswith("v0-rust-"))' | python3 -c "
          import json, sys
          entries = [json.loads(line) for line in sys.stdin]
          groups = {}
          for e in entries:
              base = '-'.join(e['key'].rsplit('-', 1)[:-1])
              groups.setdefault(base, []).append(e)
          to_delete = []
          for base, items in groups.items():
              items.sort(key=lambda x: x['lastAccessedAt'], reverse=True)
              to_delete.extend(items[1:])
          for d in to_delete:
              print(f\"Deleting {d['sizeInBytes']//1048576}MB {d['key']}\")
          with open('/tmp/cache-ids.txt', 'w') as f:
              for d in to_delete:
                  f.write(str(d['id']) + '\n')
          print(f'Total: {len(to_delete)} stale entries')
          "
          if [ -f /tmp/cache-ids.txt ]; then
            while read id; do
              gh cache delete "$id" -R ${{ github.repository }} 2>/dev/null || true
            done < /tmp/cache-ids.txt
          fi
          echo "::endgroup::"

  check:
    name: Format & Lint
    needs: [pr-limit]
    if: "always() && !(github.ref == 'refs/heads/main' && github.event_name == 'push') && (needs.pr-limit.result == 'success' || needs.pr-limit.result == 'skipped')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: rustfmt, clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: swatinem/rust-cache@v2
        with:
          shared-key: check
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo fmt --check --all
      - run: cargo clippy --workspace -- -D warnings
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
      - name: Generate TypeScript bindings
        run: cargo test export_bindings --workspace
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
      - uses: actions/upload-artifact@v4
        with:
          name: ts-bindings-${{ github.sha }}
          path: crates/*/bindings/*.ts
          retention-days: 90

  test-matrix:
    name: Tests (${{ matrix.group.name }})
    needs: [pr-limit]
    if: "always() && !(github.ref == 'refs/heads/main' && github.event_name == 'push') && (needs.pr-limit.result == 'success' || needs.pr-limit.result == 'skipped')"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group:
          - { name: "lib", cmd: "--lib --workspace" }
          - { name: "mock-tenko", cmd: "--test mock_tenko" }
          - { name: "mock-dtako", cmd: "--test mock_dtako" }
          - { name: "mock-devices", cmd: "--test mock_devices" }
          - { name: "mock-carins", cmd: "--test mock_carins" }
          - { name: "mock-misc", cmd: "--test mock_misc --test archive_repo_test" }
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      TEST_DATABASE_URL: "postgresql://postgres:test@localhost:5432/postgres?options=-c search_path=alc_api"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: llvm-tools-preview
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.group.name }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.4,cargo-nextest

      - name: Init DB
        run: psql "postgresql://postgres:test@localhost:5432/postgres" -f scripts/init_local_db.sql

      - name: Run tests with coverage
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: |
          cargo llvm-cov nextest --no-report ${{ matrix.group.cmd }}
          PKGS=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[].name' | sed 's/^/-p /' | tr '\n' ' ')
          cargo llvm-cov report $PKGS --text > /tmp/llvm-cov-output.txt
          echo "=== Coverage Summary ==="
          tail -5 /tmp/llvm-cov-output.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.group.name }}
          path: /tmp/llvm-cov-output.txt
          retention-days: 1

  coverage-check:
    name: Coverage Check
    needs: [test-matrix]
    if: "always() && needs.test-matrix.result == 'success'"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: /tmp/coverage-parts
      - name: Merge coverage and check
        run: |
          python3 scripts/merge_coverage.py /tmp/coverage-parts/*/llvm-cov-output.txt > /tmp/llvm-cov-output.txt
          echo "=== Merged Coverage Summary ==="
          # Count totals from merged output
          python3 -c "
          import re, sys
          total_lines = 0; total_miss = 0
          current = None
          with open('/tmp/llvm-cov-output.txt') as f:
              for line in f:
                  if re.match(r'^/.*\.rs:$', line.strip()):
                      current = True
                  elif current and re.match(r'^\s*\d+\|\s*0\|', line):
                      total_lines += 1; total_miss += 1
                  elif current and re.match(r'^\s*\d+\|\s*[1-9]', line):
                      total_lines += 1
          covered = total_lines - total_miss
          pct = covered / total_lines * 100 if total_lines else 0
          print(f'Lines: {total_lines}, Covered: {covered}, Missed: {total_miss}, Coverage: {pct:.1f}%')
          "
          bash scripts/check_coverage_100.sh --combined --use-cache /tmp/llvm-cov-output.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: llvm-cov-text
          path: /tmp/llvm-cov-output.txt
          retention-days: 30

  docker-push:
    name: Docker Image → GHCR
    needs: [pr-limit]
    if: "always() && github.event_name == 'pull_request' && (needs.pr-limit.result == 'success' || needs.pr-limit.result == 'skipped')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: ippoan/setup-bazel@main
        with:
          disk-cache: bazel
          r2-endpoint: ${{ vars.BAZEL_R2_ENDPOINT }}
          r2-bucket: ${{ vars.BAZEL_R2_BUCKET }}
          r2-access-key-id: ${{ secrets.BAZEL_R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.BAZEL_R2_SECRET_ACCESS_KEY }}

      - name: Build release binaries (Bazel)
        run: bazel build -c opt //:rust-alc-api //:migrate //:archive //crates/gateway //crates/tenko-api //crates/carins-api //crates/dtako-api

      - name: Prepare Docker context (backend)
        run: |
          mkdir -p docker-context
          cp bazel-bin/rust-alc-api docker-context/
          cp bazel-bin/migrate docker-context/
          cp bazel-bin/archive docker-context/
          cp bazel-bin/crates/tenko-api/tenko-api docker-context/
          cp bazel-bin/crates/carins-api/carins-api docker-context/
          cp bazel-bin/crates/dtako-api/dtako-api docker-context/
          chmod u+w docker-context/rust-alc-api docker-context/migrate docker-context/archive docker-context/tenko-api docker-context/carins-api docker-context/dtako-api
          strip docker-context/rust-alc-api docker-context/migrate docker-context/archive docker-context/tenko-api docker-context/carins-api docker-context/dtako-api
          cp -r migrations docker-context/
          cp Dockerfile docker-context/

      - name: Prepare Docker context (gateway)
        run: |
          mkdir -p gateway-context
          cp bazel-bin/crates/gateway/gateway gateway-context/
          chmod u+w gateway-context/gateway
          strip gateway-context/gateway
          cp Dockerfile.gateway gateway-context/Dockerfile

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend (sha tag)
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push gateway (sha tag)
        uses: docker/build-push-action@v6
        with:
          context: gateway-context
          push: true
          tags: ghcr.io/${{ github.repository }}-gateway:${{ github.sha }}
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway

  docker-dev:
    name: Tag dev
    if: github.event_name == 'pull_request'
    needs: [docker-push]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy sha tag to dev (backend)
        run: |
          docker pull ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}:${{ github.sha }} ghcr.io/${{ github.repository }}:dev
          docker push ghcr.io/${{ github.repository }}:dev

      - name: Copy sha tag to dev (gateway)
        run: |
          docker pull ghcr.io/${{ github.repository }}-gateway:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}-gateway:${{ github.sha }} ghcr.io/${{ github.repository }}-gateway:dev
          docker push ghcr.io/${{ github.repository }}-gateway:dev

  docker-latest:
    name: Tag latest
    if: "always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.check.result == 'success' && needs.coverage-check.result == 'success'"
    needs: [check, coverage-check]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag dev → sha + latest (no rebuild)
        run: |
          docker pull ghcr.io/${{ github.repository }}:dev
          docker tag ghcr.io/${{ github.repository }}:dev ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}:dev ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}:latest

      - name: Retag gateway dev → sha + latest
        run: |
          docker pull ghcr.io/${{ github.repository }}-gateway:dev
          docker tag ghcr.io/${{ github.repository }}-gateway:dev ghcr.io/${{ github.repository }}-gateway:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}-gateway:dev ghcr.io/${{ github.repository }}-gateway:latest
          docker push ghcr.io/${{ github.repository }}-gateway:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}-gateway:latest

  deploy-staging:
    name: Deploy Staging
    if: github.event_name == 'pull_request'
    needs: [docker-push, coverage-check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Staging PostgreSQL イメージ build & push
      - name: Build staging-db image
        run: |
          docker build -f staging/Dockerfile.postgres \
            -t ghcr.io/${{ github.repository }}-staging-db:latest .
          docker push ghcr.io/${{ github.repository }}-staging-db:latest

      # Staging app イメージ (entrypoint 差し替え版) build & push
      - name: Build staging app image
        run: |
          mkdir -p staging-context/staging
          docker create --name extract ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker cp extract:/usr/local/bin/rust-alc-api staging-context/
          docker cp extract:/usr/local/bin/migrate staging-context/
          docker cp extract:/usr/local/bin/archive staging-context/
          docker cp extract:/app/migrations staging-context/
          docker rm extract
          cp staging/Dockerfile.app staging-context/Dockerfile
          cp staging/entrypoint.sh staging-context/staging/
          docker build -t ghcr.io/${{ github.repository }}-staging:${{ github.sha }} staging-context/
          docker push ghcr.io/${{ github.repository }}-staging:${{ github.sha }}

      # GCP 認証 & Cloud Run デプロイ
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (multi-container)
        run: |
          AR_PREFIX="asia-northeast1-docker.pkg.dev/cloudsql-sv/ghcr"
          APP_IMAGE="${AR_PREFIX}/ghcr.io/${{ github.repository }}-staging:${{ github.sha }}"
          DB_IMAGE="${AR_PREFIX}/ghcr.io/${{ github.repository }}-staging-db:latest"

          STAGING_URL="${{ vars.STAGING_API_URL }}"

          GW_IMAGE="${AR_PREFIX}/ghcr.io/${{ github.repository }}-gateway:${{ github.sha }}"

          sed -e "s|PLACEHOLDER_APP_IMAGE|${APP_IMAGE}|" \
              -e "s|PLACEHOLDER_DB_IMAGE|${DB_IMAGE}|" \
              -e "s|PLACEHOLDER_GATEWAY_IMAGE|${GW_IMAGE}|" \
              -e "s|PLACEHOLDER_STAGING_URL|${STAGING_URL}|" \
              staging/cloudrun-staging.yaml > /tmp/staging-deploy.yaml

          gcloud run services replace /tmp/staging-deploy.yaml \
            --region asia-northeast1 \
            --project cloudsql-sv

          gcloud run services add-iam-policy-binding rust-alc-api-staging \
            --region asia-northeast1 \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --project cloudsql-sv

      - name: Print staging URL
        run: |
          URL=$(gcloud run services describe rust-alc-api-staging \
            --region asia-northeast1 --project cloudsql-sv \
            --format 'value(status.url)')
          echo "::notice ::Staging URL: $URL"

  migrate:
    name: Migrate
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote dev → version + sha (build once, promote)
        run: |
          docker pull ghcr.io/${{ github.repository }}:dev
          docker tag ghcr.io/${{ github.repository }}:dev ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          docker tag ghcr.io/${{ github.repository }}:dev ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Promote gateway dev → version + sha
        run: |
          docker pull ghcr.io/${{ github.repository }}-gateway:dev
          docker tag ghcr.io/${{ github.repository }}-gateway:dev ghcr.io/${{ github.repository }}-gateway:${{ github.ref_name }}
          docker tag ghcr.io/${{ github.repository }}-gateway:dev ghcr.io/${{ github.repository }}-gateway:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}-gateway:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository }}-gateway:${{ github.sha }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run migrations
        run: |
          AR_IMAGE="asia-northeast1-docker.pkg.dev/cloudsql-sv/ghcr/ghcr.io/${{ github.repository }}:${{ github.sha }}"
          JOB_NAME="rust-alc-api-migrate"
          REGION="asia-northeast1"

          if gcloud run jobs describe $JOB_NAME --region $REGION --project cloudsql-sv &>/dev/null; then
            gcloud run jobs update $JOB_NAME \
              --region $REGION --project cloudsql-sv \
              --image "$AR_IMAGE"
          else
            gcloud run jobs create $JOB_NAME \
              --region $REGION --project cloudsql-sv \
              --image "$AR_IMAGE" \
              --set-secrets "DATABASE_URL=alc-app-database-url:latest" \
              --command "migrate" \
              --memory 512Mi --task-timeout 120s --max-retries 0
          fi

          gcloud run jobs execute $JOB_NAME \
            --region $REGION --project cloudsql-sv --wait

  deploy-service:
    name: Deploy Service
    needs: [migrate, coverage-check]
    if: "always() && needs.migrate.result == 'success' && (needs.coverage-check.result == 'success' || needs.coverage-check.result == 'skipped')"
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          AR_IMAGE="asia-northeast1-docker.pkg.dev/cloudsql-sv/ghcr/ghcr.io/${{ github.repository }}:${{ github.sha }}"
          gcloud run deploy rust-alc-api \
            --image "$AR_IMAGE" \
            --region asia-northeast1 \
            --project cloudsql-sv

      - name: Print production URL
        run: |
          URL=$(gcloud run services describe rust-alc-api \
            --region asia-northeast1 --project cloudsql-sv \
            --format 'value(status.url)')
          echo "::notice ::Production URL: $URL (${GITHUB_REF_NAME})"

  deploy-gateway:
    name: Deploy Gateway
    needs: [migrate, coverage-check]
    if: "always() && needs.migrate.result == 'success' && (needs.coverage-check.result == 'success' || needs.coverage-check.result == 'skipped')"
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Gateway to Cloud Run
        run: |
          AR_IMAGE="asia-northeast1-docker.pkg.dev/cloudsql-sv/ghcr/ghcr.io/${{ github.repository }}-gateway:${{ github.sha }}"
          BACKEND_URL=$(gcloud run services describe rust-alc-api \
            --region asia-northeast1 --project cloudsql-sv \
            --format 'value(status.url)')
          TENKO_URL=$(gcloud run services describe rust-alc-api-tenko \
            --region asia-northeast1 --project cloudsql-sv \
            --format 'value(status.url)' 2>/dev/null || echo "")
          CARINS_URL=$(gcloud run services describe rust-alc-api-carins \
            --region asia-northeast1 --project cloudsql-sv \
            --format 'value(status.url)' 2>/dev/null || echo "")
          DTAKO_URL=$(gcloud run services describe rust-alc-api-dtako \
            --region asia-northeast1 --project cloudsql-sv \
            --format 'value(status.url)' 2>/dev/null || echo "")

          ENV_VARS="BACKEND_URL=${BACKEND_URL}"
          if [ -n "$TENKO_URL" ]; then
            ENV_VARS="${ENV_VARS},TENKO_API_URL=${TENKO_URL}"
          fi
          if [ -n "$CARINS_URL" ]; then
            ENV_VARS="${ENV_VARS},CARINS_API_URL=${CARINS_URL}"
          fi
          if [ -n "$DTAKO_URL" ]; then
            ENV_VARS="${ENV_VARS},DTAKO_API_URL=${DTAKO_URL}"
          fi

          gcloud run deploy rust-alc-api-gateway \
            --image "$AR_IMAGE" \
            --region asia-northeast1 \
            --project cloudsql-sv \
            --allow-unauthenticated \
            --set-secrets "JWT_SECRET=JWT_SECRET:latest" \
            --set-env-vars "$ENV_VARS" \
            --port 8080 \
            --memory 256Mi \
            --cpu 1 \
            --max-instances 5

      - name: Print gateway URL
        run: |
          URL=$(gcloud run services describe rust-alc-api-gateway \
            --region asia-northeast1 --project cloudsql-sv \
            --format 'value(status.url)')
          echo "::notice ::Gateway URL: $URL (${GITHUB_REF_NAME})"

