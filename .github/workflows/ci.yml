name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: rustfmt, clippy
      - uses: swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings

  unit-tests:
    name: Unit Tests + Coverage (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: llvm-tools-preview
      - uses: swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.4

      - name: Run unit tests
        run: cargo test --lib

      - name: Coverage regression check (unit files)
        run: bash scripts/check_coverage_100.sh --unit-only

  mock-tests:
    name: Mock Tests + Coverage (no DB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: llvm-tools-preview
      - uses: swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.4

      - name: Run mock tests + coverage
        run: |
          cargo llvm-cov --test 'mock_*' --text > /tmp/mock-cov.txt 2>/tmp/mock-cov-stderr.txt || { echo "Mock tests failed:"; tail -30 /tmp/mock-cov-stderr.txt; exit 1; }
          echo "=== Test results ==="
          grep "test result:" /tmp/mock-cov-stderr.txt || true

      - name: Coverage regression check (mock files)
        run: bash scripts/check_coverage_100.sh --mock-only --use-cache /tmp/mock-cov.txt

  integration-tests:
    name: Integration Tests + Coverage (full)
    runs-on: ubuntu-latest
    needs: check
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://postgres:test@localhost:5432/postgres?options=-c search_path=alc_api
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: llvm-tools-preview
      - uses: swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.4

      - name: Initialize test database
        run: psql -f scripts/init_local_db.sql
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: test

      - name: Show versions
        run: |
          rustc --version
          cargo llvm-cov --version

      - name: Run integration tests + coverage
        run: |
          cargo llvm-cov --text > /tmp/llvm-cov-output.txt 2>/tmp/llvm-cov-stderr.txt || { echo "cargo llvm-cov failed:"; tail -30 /tmp/llvm-cov-stderr.txt; exit 1; }
          echo "=== Test results ==="
          grep "test result:" /tmp/llvm-cov-stderr.txt || true

      - name: Coverage regression check (all 100% files)
        run: bash scripts/check_coverage_100.sh --use-cache /tmp/llvm-cov-output.txt

      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llvm-cov-text
          path: /tmp/llvm-cov-output.txt
          retention-days: 30
