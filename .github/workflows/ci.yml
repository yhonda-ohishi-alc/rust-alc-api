name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: rustfmt, clippy
      - uses: swatinem/rust-cache@v2
      - run: cargo fmt --check --all
      - run: cargo clippy --workspace -- -D warnings

  full-tests:
    name: Full Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: llvm-tools-preview
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target/llvm-cov-target"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.4,cargo-nextest

      - name: Run lib + mock tests with coverage (single compile)
        run: |
          cargo llvm-cov nextest --no-report --lib --workspace --test mock_tenko --test mock_dtako --test mock_devices --test mock_carins --test mock_misc
          PKGS=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[].name' | sed 's/^/-p /' | tr '\n' ' ')
          cargo llvm-cov report $PKGS --text > /tmp/llvm-cov-output.txt
          echo "=== Coverage Summary ==="
          tail -5 /tmp/llvm-cov-output.txt

      - name: Coverage regression check (all 100% files)
        run: bash scripts/check_coverage_100.sh --combined --use-cache /tmp/llvm-cov-output.txt

      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llvm-cov-text
          path: /tmp/llvm-cov-output.txt
          retention-days: 30


  ts-bindings:
    name: TypeScript Bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Generate TypeScript bindings
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo test export_bindings --workspace
      - uses: actions/upload-artifact@v4
        with:
          name: ts-bindings-${{ github.sha }}
          path: crates/*/bindings/*.ts
          retention-days: 90

  docker-push:
    name: Docker Image → GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.92.0

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: swatinem/rust-cache@v2

      - name: Build release binaries
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo build --release

      - name: Prepare Docker context
        run: |
          mkdir -p docker-context
          cp target/release/rust-alc-api docker-context/
          cp target/release/migrate docker-context/
          cp -r migrations docker-context/
          cp Dockerfile docker-context/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (sha tag)
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-latest:
    name: Tag latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [check, full-tests, docker-push]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy sha tag to latest
        run: |
          docker pull ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}:${{ github.sha }} ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:latest
