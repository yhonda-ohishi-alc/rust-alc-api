name: Secret Manager audit

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unused-check:
    runs-on: ubuntu-latest
    env:
      PROJECT: cloudsql-sv
      REGION: asia-northeast1
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Collect referenced secrets
        run: |
          set -o pipefail

          list_or_warn() {
            local label=$1; shift
            local out rc=0
            out=$("$@") || rc=$?
            if [ $rc -ne 0 ]; then
              echo "WARN: $label failed (exit $rc) â€” skipping" >&2
              return 0
            fi
            printf '%s\n' "$out"
          }

          {
            for s in $(list_or_warn "gcloud run services list" \
                         gcloud run services list --project=$PROJECT --region=$REGION --format='value(metadata.name)'); do
              gcloud run services describe "$s" --region=$REGION --project=$PROJECT \
                --flatten='spec.template.spec.containers[].env[]' \
                --format='value(spec.template.spec.containers.env.valueFrom.secretKeyRef.name)'
              gcloud run services describe "$s" --region=$REGION --project=$PROJECT \
                --flatten='spec.template.spec.volumes[]' \
                --format='value(spec.template.spec.volumes.secret.secretName)'
            done
            for j in $(list_or_warn "gcloud run jobs list" \
                         gcloud run jobs list --project=$PROJECT --region=$REGION --format='value(metadata.name)'); do
              gcloud run jobs describe "$j" --region=$REGION --project=$PROJECT \
                --flatten='spec.template.spec.template.spec.containers[].env[]' \
                --format='value(spec.template.spec.template.spec.containers.env.valueFrom.secretKeyRef.name)'
              gcloud run jobs describe "$j" --region=$REGION --project=$PROJECT \
                --flatten='spec.template.spec.template.spec.volumes[]' \
                --format='value(spec.template.spec.template.spec.volumes.secret.secretName)'
            done
            for f in $(list_or_warn "gcloud functions list" \
                         gcloud functions list --project=$PROJECT --regions=$REGION --format='value(name)'); do
              gcloud functions describe "$f" --region=$REGION --project=$PROJECT \
                --flatten='secretEnvironmentVariables[]' \
                --format='value(secretEnvironmentVariables.secret)'
              gcloud functions describe "$f" --region=$REGION --project=$PROJECT \
                --flatten='secretVolumes[]' \
                --format='value(secretVolumes.secret)'
            done
          } | sed '/^$/d' | sort -u > referenced.txt
          echo "Referenced secrets ($(wc -l < referenced.txt)):"
          cat referenced.txt

      - name: Find unused secrets
        id: unused
        run: |
          set -o pipefail
          gcloud secrets list --project=$PROJECT --format='value(name.basename())' | sort -u > all.txt
          comm -23 all.txt referenced.txt > not-referenced.txt
          echo "Not in Cloud Run/Jobs/Functions spec ($(wc -l < not-referenced.txt)):"
          cat not-referenced.txt

          : > unused.txt
          while read s; do
            [ -z "$s" ] && continue
            rc=0
            out=$(gcloud logging read \
                "protoPayload.serviceName=\"secretmanager.googleapis.com\" AND protoPayload.methodName=~\".*AccessSecretVersion$\" AND protoPayload.resourceName=~\"secrets/$s(/|$)\"" \
                --project=$PROJECT --freshness=30d --limit=1 \
                --format='value(timestamp)') || rc=$?
            if [ $rc -ne 0 ]; then
              echo "WARN: gcloud logging read failed for $s (exit $rc) â€” skipping unused check" >&2
              continue
            fi
            n=$(printf '%s' "$out" | grep -c . || true)
            if [ "$n" = "0" ]; then
              echo "$s" >> unused.txt
            fi
          done < not-referenced.txt

          echo "Confirmed unused (no ref + no access in 30d): $(wc -l < unused.txt)"
          cat unused.txt
          echo "count=$(wc -l < unused.txt)" >> "$GITHUB_OUTPUT"

      - name: Write finding to Cloud Logging
        if: steps.unused.outputs.count != '0'
        run: |
          secrets_json=$(awk 'NF{printf "\"%s\",", $0}' unused.txt | sed 's/,$//')
          count=$(wc -l < unused.txt | tr -d ' ')
          payload="{\"finding\":\"unused_secrets\",\"count\":${count},\"secrets\":[${secrets_json}],\"note\":\"not referenced by Cloud Run/Jobs/Functions and no AccessSecretVersion in past 30 days (audit log enabled 2026-04-19)\"}"
          echo "$payload"
          gcloud logging write secret-audit "$payload" \
            --payload-type=json \
            --severity=ERROR \
            --project=$PROJECT

      - name: Summary
        run: |
          {
            echo "## Secret Manager audit"
            echo "- Referenced: $(wc -l < referenced.txt)"
            echo "- Not referenced: $(wc -l < not-referenced.txt)"
            echo "- Confirmed unused (static + 30d audit): ${{ steps.unused.outputs.count }}"
            if [ -s unused.txt ]; then
              echo "### Unused secrets"
              echo '```'
              cat unused.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
